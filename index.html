<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Identifier</title>
    <!-- Load PyScript Engine -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #status { color: #666; font-style: italic; }
        #result { margin-top: 20px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Fake News Identifier</h1>
    <p id="status">Downloading model into your browser's memory... Please wait a few seconds.</p>
    
    <textarea id="news-text" placeholder="Paste news article here..."></textarea>
    <button id="predict-btn" disabled>Predict</button>
    <div id="result"></div>

    <!-- Configure PyScript to load dependencies and fetch the .pkl files into the browser's virtual filesystem -->
    <py-config>
        packages = ["scikit-learn", "joblib"]
        
        [[fetch]]
        files = ["./back-end/model.pkl", "./back-end/vectorizer.pkl"]
    </py-config>

    <!-- Client-Side Python Script -->
    <script type="py">
        import joblib
        from pyscript import document

        # Load the models 
        vectorizer = joblib.load("./back-end/vectorizer.pkl")
        model = joblib.load("./back-end/model.pkl")

        # Enable the button and update status once models are fully loaded
        btn = document.getElementById("predict-btn")
        btn.disabled = False
        document.getElementById("status").innerText = "Model loaded successfully! Ready to predict."

        def predict_news(event):
            # Retrieve text from the UI
            text = document.getElementById("news-text").value
            
            if not text.strip():
                document.getElementById("result").innerText = "Please enter some text."
                return

            # Vectorize and Predict
            vec_text = vectorizer.transform([text])
            prediction = model.predict(vec_text)[0]
            
            # Update the UI
            result_text = "Fake News" if prediction == 1 else "Real News"
            document.getElementById("result").innerText = f"Prediction: {result_text}"

        # Bind the HTML button to the Python function
        btn.onclick = predict_news
    </script>
</body>
</html>
